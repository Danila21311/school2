# Подключи репозиторий в Render → "New Blueprint Instance" — сервис создастся сам.
# Если корень Git не папка с package.json, а родительская, раскомментируй rootDir.
version: "1"
services:
  - type: web
    name: liquid-school-portal
    runtime: node
    region: frankfurt
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /
    # rootDir: liquid-school-portal-main
    envVars:
      - key: NODE_ENV
        value: production
